services:
  api:
    build: .
    container_name: library_Management_fastapi
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://library_user:12345678@postgres:5432/library_db
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    container_name: library_postgres
    environment:
        POSTGRES_DB: library_db
        POSTGRES_USER: library_user
        POSTGRES_PASSWORD: library_pass
    ports:
        - "5433:5432"
    volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
        postgres_data: